<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Máy Tính Cầm Tay</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #635958;
      color: #eeb6b6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .calculator {
      background-color: #333;
      border: 2px solid #555;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 20px;
    }

    .calculator h1 {
      font-size: 32px;
      color: #fff;
      margin-bottom: 20px;
    }

    .calculator .input-group {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .calculator .input-group span {
      flex: 1;
      text-align: left;
      font-weight: bold;
      font-size: 20px;
      color: #ccc;
    }

    .calculator .input-group input,
    .calculator select {
      flex: 2;
      padding: 12px;
      border: 2px solid #555;
      border-radius: 4px;
      font-size: 20px;
      color: #fff;
      background-color: #333;
    }

    .calculator select {
      font-size: 20px;
      background-color: #333;
      color: #fff;
    }

    .calculator p {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
      color: #00ff00;
    }
  </style>
</head>

<body>
  <div class="calculator">
    <h1>Máy Tính Cầm Tay</h1>
    <div class="input-group">
      <span>Số thứ nhất:</span>
      <input type="number" id="num1" placeholder="Nhập số thứ nhất" onchange="calculate()">
    </div>
    <div class="input-group">
      <span>Phép tính:</span>
      <select id="operator" onchange="calculate()">
        <option value="+">Cộng</option>
        <option value="-">Trừ</option>
        <option value="*">Nhân</option>
        <option value="/">Chia</option>
      </select>
    </div>
    <div class="input-group">
      <span>Số thứ hai:</span>
      <input type="number" id="num2" placeholder="Nhập số thứ hai" onchange="calculate()">
    </div>
    <p>Kết quả: <span id="result"></span></p>
  </div>
  <script>
    function calculate() {
      var num1 = document.getElementById("num1").value;
      var num2 = document.getElementById("num2").value;
      var operator = document.getElementById("operator").value;
      var result = num1 + operator + num2;
      document.getElementById("result").textContent = eval(result);
    }
  </script>
</body>

</html>
