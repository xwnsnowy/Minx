<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login System</title>
</head>

<body>
  <div class="main">
    <form action="" method="GET" class="form" id="form-1">
      <h3 class="heading">Login System</h3>
      <div class="spacer"></div>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input id="username" name="username" type="text" placeholder="VD: email@domain.com" class="form-control"
          autocomplete="username">
        <div class="mar-btm-6px"><span class="form-message"></span></div>
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" class="form-control"
          autocomplete="new-password">
        <div class="mar-btm-6px"><span class="form-message"></span></div>
      </div>
      <button class="form-submit" id="loginButton">Login</button>
    </form>
  </div>
  <script src="validator.js"></script>
  <script src="main.js"></script>
  <script>
    Validator({
      form: "#form-1",
      errorSelector: ".form-message",
      invalid: ".invalid",
      rules: [
        Validator.minLength("#username", 6),
        Validator.minLength("#password", 6),
      ],
    });
  </script>
</body>

</html>
