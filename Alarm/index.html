<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>

<body>
  <div class="wrapper">
    <div class="clock" id="currentClock"></div>
    <div class="input-time">
      <input placeholder="00" id='hours' type="number" min="0" max="23">
      <input placeholder="00" id='minutes' type="number" min="0" max="59">
    </div>

    <div class="btn-add">
      <button>Add Alarm</button>
    </div>
    <div class="list-alarm" id="alarmList"></div>
  </div>
  <script src="main.js"></script>
</body>

</html>
